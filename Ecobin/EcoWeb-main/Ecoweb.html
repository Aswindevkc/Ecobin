<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECO BIN - Administrative & Operational Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0',
                            500: '#10b981', 600: '#16a34a', 700: '#15803d', 950: '#022c22'
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        input:focus,
        select:focus,
        textarea:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>

<body
    class="h-full font-sans antialiased text-slate-700 bg-slate-50 dark:bg-slate-950 dark:text-slate-300 selection:bg-emerald-100 dark:selection:bg-emerald-950 transition-colors duration-300 relative flex flex-col justify-between"
    x-data="loginPortal()" x-init="initTheme()" x-cloak>

    <div
        class="absolute top-0 right-0 -z-10 pointer-events-none w-96 h-96 bg-emerald-50/50 dark:bg-emerald-950/10 rounded-full blur-3xl">
    </div>
    <div
        class="absolute bottom-0 left-0 -z-10 pointer-events-none w-96 h-96 bg-emerald-50/30 dark:bg-emerald-950/20 rounded-full blur-3xl">
    </div>

    <div x-show="toast" x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-2 sm:translate-y-0 sm:translate-x-2"
        x-transition:enter-end="opacity-100 translate-y-0 sm:translate-x-0"
        x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed bottom-6 right-6 z-50 bg-slate-900 text-white dark:bg-emerald-950 dark:border dark:border-emerald-855 px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3 text-xs font-semibold tracking-wide"
        style="display: none;">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span>
        <span x-text="toast"></span>
    </div>

    <header
        class="py-6 px-6 md:px-12 flex items-center justify-between border-b border-emerald-50 dark:border-slate-800 bg-white/40 dark:bg-slate-900/40 backdrop-blur-md">
        <div class="flex items-center gap-2.5">
            <div
                class="h-8 w-8 bg-emerald-600 text-white rounded-lg flex items-center justify-center font-bold text-xs tracking-tighter">
                EB
            </div>
            <div>
                <h1 class="text-xs uppercase tracking-widest font-black text-emerald-900 dark:text-emerald-400">Eco Bin
                </h1>
                <p class="text-[9px] text-emerald-600 dark:text-emerald-500 font-bold uppercase tracking-wider">Control
                    WebPortal</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button @click="toggleTheme()"
                class="p-2 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 transition-colors text-slate-500 dark:text-slate-400"
                aria-label="Toggle dark mode">
                <svg x-show="!darkMode" class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m2.828 5.657a5 5 0 1110 0 5 5 0 01-10 0z" />
                </svg>
                <svg x-show="darkMode" class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>

            <div
                class="flex items-center gap-2 px-3 py-1 bg-white dark:bg-slate-900 border border-emerald-100 dark:border-slate-800 rounded-full text-[10px] text-emerald-700 dark:text-emerald-400 font-semibold shadow-sm">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"
                    :class="user ? 'animate-ping' : 'animate-pulse'"></span>
                <span x-text="user ? 'Session Active' : 'App Sync Connected'"></span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center py-12 px-6">

        <template x-if="!user">
            <div
                class="w-full max-w-md bg-white dark:bg-slate-900 border border-emerald-100 dark:border-slate-800 p-8 rounded-3xl shadow-sm space-y-6">
                <div class="space-y-4 text-center">
                    <div
                        class="mx-auto h-12 w-12 bg-emerald-50 dark:bg-emerald-950/40 rounded-2xl flex items-center justify-center text-emerald-500 border border-emerald-100 dark:border-slate-800">
                        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M12 2c5.523 0 10 4.477 10 10a10 10 0 0 1-10 10m0-20A10 10 0 0 0 2 12a10 10 0 0 0 10 10m0-20v20"
                                stroke-linecap="round" />
                            <path d="M12 12c2-3 5-4 5-4s-1 4-4 5c-3 1-5 2-5 2s1-3 4-3z" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-extrabold tracking-tight text-emerald-950 dark:text-white">ECO BIN
                            Control Portal</h2>
                    </div>
                </div>

                <div class="space-y-1">
                    <label
                        class="text-[10px] font-bold uppercase tracking-wider text-emerald-700 dark:text-emerald-500">Security
                        Access Portal</label>
                    <div
                        class="grid grid-cols-2 gap-2 bg-slate-50 dark:bg-slate-800/40 p-1.5 rounded-2xl border border-slate-200/60 dark:border-slate-800">
                        <button type="button" @click="credentials.passkey = 'adm_pass'"
                            :class="credentials.passkey === 'adm_pass' ? 'bg-emerald-600 text-white font-bold shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-900'"
                            class="py-2 px-3 rounded-xl text-[10px] transition-all duration-150 uppercase tracking-widest font-extrabold">
                            Admin
                        </button>
                        <button type="button" @click="credentials.passkey = 'office_pass'"
                            :class="credentials.passkey === 'office_pass' ? 'bg-emerald-600 text-white font-bold shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-900'"
                            class="py-2 px-3 rounded-xl text-[10px] transition-all duration-150 uppercase tracking-widest font-extrabold">
                            Office Staff
                        </button>
                    </div>
                </div>

                <form @submit.prevent="submitLogin()" class="space-y-5">
                    <template x-if="errorMessage">
                        <div
                            class="bg-rose-50 dark:bg-rose-950/20 text-rose-700 dark:text-rose-400 p-3.5 rounded-xl text-xs font-semibold border border-rose-100 dark:border-rose-900/50 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-rose-500 shrink-0"></span>
                            <span x-text="errorMessage"></span>
                        </div>
                    </template>

                    <div class="space-y-1">
                        <label
                            class="text-[10px] font-bold uppercase tracking-wider text-emerald-700 dark:text-emerald-500">User
                            Security ID</label>
                        <input type="text" required x-model="credentials.id"
                            class="w-full bg-slate-50/50 dark:bg-slate-800/40 focus:bg-white dark:focus:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-emerald-400 rounded-xl px-4 py-3 text-sm focus:outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-slate-100"
                            placeholder="Enter your system identifier">
                    </div>

                    <div class="space-y-1">
                        <label
                            class="text-[10px] font-bold uppercase tracking-wider text-emerald-700 dark:text-emerald-500">Password</label>
                        <input type="password" required x-model="credentials.password"
                            class="w-full bg-slate-50/50 dark:bg-slate-800/40 focus:bg-white dark:focus:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-emerald-400 rounded-xl px-4 py-3 text-sm focus:outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-slate-100"
                            placeholder="••••••••">
                    </div>

                    <button type="submit" :disabled="loading"
                        class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs py-3.5 rounded-xl transition duration-150 tracking-wider uppercase flex items-center justify-center gap-2 shadow-sm">
                        <span x-text="loading ? 'Authenticating...' : 'Authenticate Portal'"></span>
                    </button>
                </form>

                <div class="pt-6 border-t border-emerald-100 dark:border-slate-800 text-center space-y-3">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-emerald-600 dark:text-emerald-500">
                        Automatic Role Detection Simulators</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button @click="autoFill('admin')"
                            class="border border-emerald-100/50 dark:border-slate-800 hover:border-emerald-200 bg-emerald-50/10 hover:bg-emerald-50/40 p-3 rounded-xl text-left transition group">
                            <span
                                class="text-[10px] font-bold text-emerald-900 dark:text-slate-200 group-hover:text-emerald-700 block">Admin
                                Role</span>
                            <span class="text-[9px] text-slate-400 font-mono block mt-0.5">ID: admin / admin123</span>
                        </button>
                        <button @click="autoFill('staff')"
                            class="border border-emerald-100/50 dark:border-slate-800 hover:border-emerald-200 bg-emerald-50/10 hover:bg-emerald-50/40 p-3 rounded-xl text-left transition group">
                            <span
                                class="text-[10px] font-bold text-emerald-900 dark:text-slate-200 group-hover:text-emerald-700 block">Office
                                Staff</span>
                            <span class="text-[9px] text-slate-400 font-mono block mt-0.5">ID: staff01 / staff123</span>
                        </button>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="user">
            <div
                class="w-full max-w-6xl bg-white dark:bg-slate-900 border border-emerald-100 dark:border-slate-800 p-8 rounded-3xl shadow-sm space-y-8 animate-fadeIn">

                <div
                    class="flex flex-col sm:flex-row sm:items-center justify-between pb-6 border-b border-slate-100 dark:border-slate-800 gap-4">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-[9px] font-bold uppercase tracking-widest px-2.5 py-0.5 rounded-full"
                                :class="user.role === 'ADMIN' ? 'bg-amber-50 dark:bg-amber-950/45 text-amber-950 dark:text-amber-400 border border-amber-100 dark:border-amber-900' : 'bg-emerald-50 dark:bg-emerald-950/45 text-emerald-950 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-900'"
                                x-text="user.role + ' Session'"></span>
                        </div>
                        <h2 class="text-2xl font-extrabold text-emerald-950 dark:text-white mt-1" x-text="user.name">
                        </h2>
                    </div>

                    <button @click="logout()"
                        class="text-xs font-bold text-emerald-900 dark:text-emerald-400 hover:text-rose-600 transition bg-emerald-50 dark:bg-slate-800 px-4 py-2 rounded-xl border border-emerald-100 dark:border-slate-700 self-start sm:self-center">Sign
                        Out</button>
                </div>

                <template x-if="user.role === 'ADMIN'">
                    <div class="space-y-8" x-data="adminDashboard()">

                        <div class="flex border-b border-slate-100 dark:border-slate-800 gap-6 overflow-x-auto pb-px">
                            <button @click="currentSubTab = 'staff'"
                                class="pb-3 text-xs font-bold uppercase tracking-wider transition border-b-2"
                                :class="currentSubTab === 'staff' ? 'text-emerald-600 border-emerald-600 dark:text-emerald-400 dark:border-emerald-400' : 'text-slate-400 border-transparent hover:text-slate-600 dark:hover:text-slate-300'">
                                Staff Directory
                            </button>
                            <button @click="currentSubTab = 'collection'"
                                class="pb-3 text-xs font-bold uppercase tracking-wider transition border-b-2"
                                :class="currentSubTab === 'collection' ? 'text-emerald-600 border-emerald-600 dark:text-emerald-400 dark:border-emerald-400' : 'text-slate-400 border-transparent hover:text-slate-600 dark:hover:text-slate-300'">
                                Collection Summaries
                            </button>
                            <button @click="currentSubTab = 'rewards'"
                                class="pb-3 text-xs font-bold uppercase tracking-wider transition border-b-2"
                                :class="currentSubTab === 'rewards' ? 'text-emerald-600 border-emerald-600 dark:text-emerald-400 dark:border-emerald-400' : 'text-slate-400 border-transparent hover:text-slate-600 dark:hover:text-slate-300'">
                                Reward Reports
                            </button>
                            <button @click="currentSubTab = 'complaints'"
                                class="pb-3 text-xs font-bold uppercase tracking-wider transition border-b-2"
                                :class="currentSubTab === 'complaints' ? 'text-emerald-600 border-emerald-600 dark:text-emerald-400 dark:border-emerald-400' : 'text-slate-400 border-transparent hover:text-slate-600 dark:hover:text-slate-300'">
                                Complaint Reports
                            </button>
                        </div>

                        <div x-show="currentSubTab === 'staff'" class="space-y-6 animate-fadeIn">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <h3
                                    class="text-sm font-bold uppercase tracking-wider text-emerald-955 dark:text-emerald-400">
                                    Staff Registry</h3>
                                <button @click="openStaffModal()"
                                    class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs px-4 py-2.5 rounded-xl transition shadow-sm">+
                                    Register New Staff</button>
                            </div>

                            <div
                                class="bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 p-3 rounded-2xl flex items-center gap-3">
                                <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                                <input type="text" placeholder="Filter staff..." x-model="searchQuery"
                                    class="bg-transparent text-xs w-full focus:outline-none text-slate-700 dark:text-slate-300">
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <template x-for="s in getFilteredStaff()" :key="s.id">
                                    <div class="bg-white dark:bg-slate-900 border rounded-2xl p-5 flex flex-col justify-between gap-4 transition"
                                        :class="s.status === 'Active' ? 'border-emerald-100 dark:border-slate-800 bg-[#fbfdfc] dark:bg-slate-900/60' : 'border-slate-200 dark:border-slate-800 opacity-60 bg-slate-50 dark:bg-slate-800/20'">
                                        <div class="flex items-start justify-between gap-4">
                                            <div class="space-y-1">
                                                <div class="flex items-center gap-2">
                                                    <span class="text-[10px] font-mono font-bold text-slate-400"
                                                        x-text="s.id"></span>
                                                    <span
                                                        class="text-[9px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full"
                                                        :class="s.status === 'Active' ? 'bg-emerald-50 dark:bg-emerald-955/45 text-emerald-800 dark:text-emerald-400' : 'bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400'"
                                                        x-text="s.status"></span>
                                                </div>
                                                <h4 class="font-extrabold text-slate-900 dark:text-white text-sm"
                                                    x-text="s.name"></h4>
                                                <p class="text-xs text-slate-500 dark:text-slate-400 font-semibold"
                                                    x-text="s.designation"></p>
                                                <p class="text-xs text-slate-400 dark:text-slate-505 font-mono"
                                                    x-text="'@' + s.username"></p>
                                            </div>

                                            <div class="flex items-center gap-1.5">
                                                <button @click="openStaffModal(s)"
                                                    class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-400 transition"
                                                    title="Modify Information">
                                                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                                        stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2"
                                                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                                    </svg>
                                                </button>
                                                <button @click="toggleStaffStatus(s.id)"
                                                    class="p-1.5 rounded-lg transition"
                                                    :class="s.status === 'Active' ? 'text-amber-600 hover:bg-amber-50 dark:hover:bg-amber-950/20' : 'text-emerald-600 hover:bg-emerald-50 dark:hover:bg-emerald-950/20'"
                                                    :title="s.status === 'Active' ? 'Deactivate Account' : 'Activate Account'">
                                                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                                        stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2"
                                                            d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636" />
                                                    </svg>
                                                </button>
                                            </div>
                                        </div>

                                        <div
                                            class="pt-3 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between text-xs text-slate-505">
                                            <span class="flex items-center gap-1">
                                                <svg class="h-3.5 w-3.5 text-emerald-505" fill="none"
                                                    viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="2"
                                                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                                </svg>
                                                <span x-text="s.zone"></span>
                                            </span>
                                            <span x-text="s.phone"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn"
                                x-show="staffFormOpen" style="display: none;">
                                <div
                                    class="bg-white dark:bg-slate-900 rounded-3xl p-6 w-full max-w-md border border-emerald-100 dark:border-slate-850 shadow-xl space-y-4">
                                    <h4 class="text-sm font-bold uppercase tracking-wider text-emerald-950 dark:text-emerald-450"
                                        x-text="isEditMode ? 'Modify Staff Record' : 'Register New Office Staff'"></h4>

                                    <form @submit.prevent="submitStaffForm()" class="space-y-4 text-xs">
                                        <div class="space-y-1">
                                            <label class="font-bold text-slate-505 uppercase tracking-wider">Full
                                                Name</label>
                                            <input type="text" required x-model="staffForm.name"
                                                class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:outline-none dark:text-slate-100">
                                        </div>

                                        <div class="grid grid-cols-2 gap-3">
                                            <div class="space-y-1">
                                                <label
                                                    class="font-bold text-slate-550 uppercase tracking-wider">Username
                                                    Handle</label>
                                                <input type="text" x-model="staffForm.username"
                                                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:outline-none dark:text-slate-100"
                                                    placeholder="user_handle">
                                            </div>
                                            <div class="space-y-1">
                                                <label
                                                    class="font-bold text-slate-550 uppercase tracking-wider">Designation</label>
                                                <input type="text" x-model="staffForm.designation"
                                                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:outline-none dark:text-slate-100"
                                                    placeholder="e.g., Coordinator">
                                            </div>
                                        </div>

                                        <div class="grid grid-cols-2 gap-3">
                                            <div class="space-y-1">
                                                <label class="font-bold text-slate-550 uppercase tracking-wider">Email
                                                    Address</label>
                                                <input type="email" required x-model="staffForm.emailId"
                                                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:outline-none dark:text-slate-101"
                                                    placeholder="name@ecobin.com">
                                            </div>
                                            <div class="space-y-1">
                                                <label class="font-bold text-slate-550 uppercase tracking-wider">Phone
                                                    Number</label>
                                                <input type="text" required x-model="staffForm.phoneNumber"
                                                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:outline-none dark:text-slate-101"
                                                    placeholder="+91 9900000000">
                                            </div>
                                        </div>

                                        <div class="space-y-1">
                                            <label class="font-bold text-slate-550 uppercase tracking-wider">Operational
                                                District</label>
                                            <select required x-model="staffForm.district"
                                                class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:outline-none dark:text-slate-101">
                                                <option value="Kottayam">Kottayam</option>
                                                <option value="Ernakulam">Ernakulam</option>
                                                <option value="Thiruvananthapuram">Thiruvananthapuram</option>
                                                <option value="Kozhikode">Kozhikode</option>
                                            </select>
                                        </div>

                                        <div class="space-y-1">
                                            <label class="font-bold text-slate-550 uppercase tracking-wider">Designated
                                                Workspace Zone</label>
                                            <select x-model="staffForm.zone"
                                                class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:outline-none dark:text-slate-100">
                                                <option value="Zone A (North)">Zone A (North)</option>
                                                <option value="Zone B (East)">Zone B (East)</option>
                                                <option value="Zone C (West)">Zone C (West)</option>
                                                <option value="Zone D (South)">Zone D (South)</option>
                                            </select>
                                        </div>

                                        <div class="flex items-center gap-2 py-1">
                                            <input type="checkbox" id="staffConsent" x-model="staffForm.consent" checked
                                                class="h-4 w-4 text-emerald-600 focus:ring-emerald-500 border-slate-300 rounded">
                                            <label for="staffConsent"

                updateRequestStatus(id, nextStatus) {
                    this.requests = this.requests.map(r => r.id === id ? { ...r, status: nextStatus } : r);
                    this.$parent.showToastMessage(`Request status updated to ${nextStatus}`);
                },
                initiateScheduling(req) {
                    this.activeRequestForSchedule = req;
                    this.scheduleForm = { date: req.preferredDate, time: '08:00 AM', workerId: '' };
                    this.scheduleModalOpen = true;
                },
                saveSchedule() {
                    const assignedWorker = this.workers.find(w => w.id === this.scheduleForm.workerId);
                    if (!assignedWorker) return;

                    const newSchedId = 'SCH-' + (100 + this.schedules.length + 6);
                    this.schedules.unshift({
                        id: newSchedId,
                        date: this.scheduleForm.date,
                        time: this.scheduleForm.time,
                        worker: assignedWorker.name,
                        zone: this.activeRequestForSchedule.address.split(',').pop().trim(),
                        status: 'Dispatched',
                        requestId: this.activeRequestForSchedule.id
                    });
                    this.updateRequestStatus(this.activeRequestForSchedule.id, 'Assigned');
                    this.scheduleModalOpen = false;
                    this.$parent.showToastMessage('Duty scheduled and dispatched successfully!');
                },
                completeSchedule(schedId, reqId) {
                    this.schedules = this.schedules.map(s => s.id === schedId ? { ...s, status: 'Completed' } : s);
                    this.requests = this.requests.map(r => r.id === reqId ? { ...r, status: 'In Progress' } : r);
                    this.$parent.showToastMessage('Schedule accomplished. Ready to award points.');
                },
                promptPointDistribution(req) {
                    this.updateRequestStatus(req.id, 'Completed');
                    this.$parent.showToastMessage(`100 PTS issued to ${req.userName} for compliant waste recycling.`);
                },
                openWorkerModal(selectedWorker = null) {
                    if (selectedWorker) {
                        this.isEditWorker = true;
                        this.workerForm = { ...selectedWorker };
                    } else {
                        this.isEditWorker = false;
                        this.workerForm = { id: '', name: '', contact: '', zone: 'Zone B (East)', status: 'Active' };
                    }
                    this.workerModalOpen = true;
                },
                submitWorkerForm() {
                    if (this.isEditWorker) {
                        this.workers = this.workers.map(w => w.id === this.workerForm.id ? { ...this.workerForm } : w);
                        this.$parent.showToastMessage(`Worker profile saved: ${this.workerForm.name}`);
                    } else {
                        const newId = 'WRK00' + (this.workers.length + 1);
                        this.workers.push({ ...this.workerForm, id: newId, completedJobs: 0 });
                        this.$parent.showToastMessage(`Registered worker: ${this.workerForm.name}`);
                    }
                    this.workerModalOpen = false;
                },
                processExpenseAction(id, resolution) {
                    this.expenses = this.expenses.map(item => {
                        if (item.id === id) item.status = resolution;
                        return item;
                    });
                    this.$parent.showToastMessage(`Incidental expense report was marked ${resolution}.`);
                },
                openComplaintAssignment(comp) {
                    this.activeComplaint = comp;
                    this.selectedComplaintWorkerId = '';
                    this.complaintModalOpen = true;
                },
                assignComplaintCrew() {
                    const worker = this.workers.find(w => w.id === this.selectedComplaintWorkerId);
                    if (!worker) return;
                    this.complaints = this.complaints.map(c => {
                        if (c.id === this.activeComplaint.id) {
                            return { ...c, status: 'Assigned', assignedWorker: worker.name };
                        }
                        return c;
                    });
                    this.complaintModalOpen = false;
                    this.$parent.showToastMessage(`Dispatched ${worker.name} to cleanup area.`);
                },
                resolveComplaint(id) {
                    this.complaints = this.complaints.map(c => c.id === id ? { ...c, status: 'Resolved' } : c);
                    this.$parent.showToastMessage('Complaint resolved and marked closed.');
                },
                processVoucherClaim(claimId) {
                    this.claims = this.claims.map(c => c.id === claimId ? { ...c, status: 'Issued' } : c);
                    this.$parent.showToastMessage('Redemption voucher code generated and transmitted.');
                },
                issueManualPoints() {
                    this.$parent.showToastMessage(`${this.pointForm.points} PTS credited to user account: ${this.pointForm.user}`);
                    this.pointForm = { user: '', points: '' };
                }
            };
        }

        function loginPortal() {
            return {
                credentials: { id: '', password: '', passkey: 'adm_pass' },
                user: null,
                loading: false,
                errorMessage: '',
                toast: null,
                darkMode: false,
                initTheme() {
                    if (localStorage.getItem('darkMode') === 'true' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        this.darkMode = true;
                        document.documentElement.classList.add('dark');
                    } else {
                        this.darkMode = false;
                        document.documentElement.classList.remove('dark');
                    }
                },
                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    document.documentElement.classList.toggle('dark', this.darkMode);
                    localStorage.setItem('darkMode', this.darkMode);
                },
                showToastMessage(msg) {
                    this.toast = msg;
                    setTimeout(() => { this.toast = null; }, 3000);
                },
                autoFill(role) {
                    if (role === 'admin') {
                        this.credentials.id = 'admin';
                        this.credentials.password = 'admin123';
                        this.credentials.passkey = 'adm_pass';
                    } else {
                        this.credentials.id = 'staff01';
                        this.credentials.password = 'staff123';
                        this.credentials.passkey = 'office_pass';
                    }
                },
                async submitLogin() {
                    this.loading = true;
                    this.errorMessage = '';
                    try {
                        let response = await fetch('http://localhost:8081/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                userId: this.credentials.id.trim(),
                                password: this.credentials.password,
                                passkey: this.credentials.passkey
                            })
                        });
                        if (response.ok) {
                            const data = await response.json();
                            if (data.page === 'admin_page') {
                                this.user = { username: this.credentials.id, role: 'ADMIN', name: data.adminName || 'Chief Administrator' };
                                this.showToastMessage(`Terminal Authenticated: ${this.user.name}`);
                            } else if (data.page === 'office_staff_page') {
                                this.user = { username: this.credentials.id, role: 'STAFF', name: data.collection_worker_name || 'Office Staff Member', zone: data.scheduledZoneName || 'Zone B (East)' };
                                this.showToastMessage(`Terminal Authenticated: ${this.user.name}`);
                            } else {
                                this.errorMessage = `Unsupported layout route: ${data.page}`;
                            }
                        } else {
                            let errText = await response.text();
                            this.errorMessage = errText || 'Authentication parameters verified failure.';
                        }
                    } catch (err) {
                        console.warn('Backend server connection failure. Booting simulation engine.', err);
                        let idToCheck = this.credentials.id.trim().toLowerCase();
                        let passkeyCheck = this.credentials.passkey;
                        if (passkeyCheck === 'adm_pass' && idToCheck === 'admin' && this.credentials.password === 'admin123') {
                            this.user = { username: 'admin', role: 'ADMIN', name: 'Chief Administrator' };
                            this.showToastMessage('Simulated Session: Chief Administrator');
                        } else if (passkeyCheck === 'office_pass' && (idToCheck === 'staff01' || idToCheck === 'staff') && this.credentials.password === 'staff123') {
                            this.user = { username: 'staff01', role: 'STAFF', name: 'Meera Joseph (Office Staff)', zone: 'Zone B (East)' };
                            this.showToastMessage('Simulated Session: Meera Joseph');
                        } else {
                            this.errorMessage = 'Offline validation failed. Verify simulator keys.';
                        }
                    } bits: {
                        this.loading = false;
                    }
                },
                logout() {
                    this.user = null;
                    this.credentials.id = '';
                    this.credentials.password = '';
                    this.showToastMessage('Session closed.');
                }
            };
        }
