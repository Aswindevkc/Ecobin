<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECO BIN - Administrative & Operational Portal</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 
                            500: '#10b981', 600: '#16a34a', 700: '#15803d', 950: '#022c22'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Alpine.js CDN for modern reactive state -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        [x-cloak] { display: none !important; }
        input:focus, select:focus, textarea:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="h-full font-sans antialiased text-slate-700 bg-slate-50 dark:bg-slate-950 dark:text-slate-300 selection:bg-emerald-100 dark:selection:bg-emerald-950 transition-colors duration-300 relative flex flex-col justify-between" x-data="loginPortal()" x-init="initTheme()" x-cloak>

    <!-- Light/Dark Ambient Background Glows -->
    <div class="absolute top-0 right-0 -z-10 pointer-events-none w-96 h-96 bg-emerald-50/50 dark:bg-emerald-950/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 -z-10 pointer-events-none w-96 h-96 bg-emerald-50/30 dark:bg-emerald-950/20 rounded-full blur-3xl"></div>

    <!-- HEADER: Minimal Top Branding -->
    <header class="py-6 px-6 md:px-12 flex items-center justify-between border-b border-emerald-50 dark:border-slate-800 bg-white/40 dark:bg-slate-900/40 backdrop-blur-md">
        <div class="flex items-center gap-2.5">
            <div class="h-8 w-8 bg-emerald-600 text-white rounded-lg flex items-center justify-center font-bold text-xs tracking-tighter">
                EB
            </div>
            <div>
                <h1 class="text-xs uppercase tracking-widest font-black text-emerald-900 dark:text-emerald-400">Eco Bin</h1>
                <p class="text-[9px] text-emerald-600 dark:text-emerald-500 font-bold uppercase tracking-wider">Control WebPortal</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- Global Interactive Dark Theme Switch -->
            <button @click="toggleTheme()" class="p-2 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 transition-colors text-slate-500 dark:text-slate-400" aria-label="Toggle dark mode">
                <svg x-show="!darkMode" class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m2.828 5.657a5 5 0 1110 0 5 5 0 01-10 0z"/></svg>
                <svg x-show="darkMode" class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            </button>

            <!-- Light Eco-Friendly Live Badge -->
            <div class="flex items-center gap-2 px-3 py-1 bg-white dark:bg-slate-900 border border-emerald-100 dark:border-slate-800 rounded-full text-[10px] text-emerald-700 dark:text-emerald-400 font-semibold shadow-sm">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400" :class="user ? 'animate-ping' : 'animate-pulse'"></span>
                <span x-text="user ? 'Session Active' : 'App Sync Connected'"></span>
            </div>
        </div>
    </header>

    <!-- MAIN PORTAL WRAPPER -->
    <main class="flex-1 flex items-center justify-center py-12 px-6">
        
        <!-- 1. THE MAIN LOGIN SCREEN (Default View) -->
        <template x-if="!user">
            <div class="w-full max-w-md bg-white dark:bg-slate-900 border border-emerald-100 dark:border-slate-800 p-8 rounded-3xl shadow-sm space-y-8">
                
                <!-- Logo & Minimal Title -->
                <div class="space-y-4 text-center">
                    <div class="mx-auto h-12 w-12 bg-emerald-50 dark:bg-emerald-950/40 rounded-2xl flex items-center justify-center text-emerald-500 border border-emerald-100 dark:border-slate-800">
                        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2c5.523 0 10 4.477 10 10a10 10 0 0 1-10 10m0-20A10 10 0 0 0 2 12a10 10 0 0 0 10 10m0-20v20" stroke-linecap="round"/>
                            <path d="M12 12c2-3 5-4 5-4s-1 4-4 5c-3 1-5 2-5 2s1-3 4-3z" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-extrabold tracking-tight text-emerald-950 dark:text-white">ECO BIN Control Portal</h2>
                    </div>
                </div>

                <!-- Credentials Form -->
                <form @submit.prevent="submitLogin()" class="space-y-5">
                    <!-- Error Notification -->
                    <template x-if="errorMessage">
                        <div class="bg-rose-50 dark:bg-rose-950/20 text-rose-700 dark:text-rose-400 p-3.5 rounded-xl text-xs font-semibold border border-rose-100 dark:border-rose-900/50 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-rose-500 shrink-0"></span>
                            <span x-text="errorMessage"></span>
                        </div>
                    </template>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase tracking-wider text-emerald-700 dark:text-emerald-500">User Security ID</label>
                        <input type="text" required x-model="credentials.id"
                               class="w-full bg-slate-50/50 dark:bg-slate-800/40 focus:bg-white dark:focus:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-emerald-400 rounded-xl px-4 py-3 text-sm focus:outline-none transition-all placeholder:text-slate-450 text-slate-900 dark:text-slate-100"
                               placeholder="Enter your system identifier">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase tracking-wider text-emerald-700 dark:text-emerald-500">Password</label>
                        <input type="password" required x-model="credentials.password"
                               class="w-full bg-slate-50/50 dark:bg-slate-800/40 focus:bg-white dark:focus:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-emerald-400 rounded-xl px-4 py-3 text-sm focus:outline-none transition-all placeholder:text-slate-450 text-slate-900 dark:text-slate-100"
                               placeholder="••••••••">
                    </div>

                    <button type="submit" :disabled="loading"
                            class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs py-3.5 rounded-xl transition duration-150 tracking-wider uppercase flex items-center justify-center gap-2 shadow-sm">
                        <span>Authenticate</span>
                    </button>
                </form>

                <!-- INSTANT SIMULATOR INFO -->
                <div class="pt-6 border-t border-emerald-100 dark:border-slate-800 text-center space-y-3">
                    <p class="text-[10px] uppercase font-bold tracking-widest text-emerald-600 dark:text-emerald-500">Automatic Role Detection Simulators</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button @click="autoFill('admin')" class="border border-emerald-100/50 dark:border-slate-800 hover:border-emerald-200 bg-emerald-50/10 hover:bg-emerald-50/40 p-3 rounded-xl text-left transition group">
                            <span class="text-[10px] font-bold text-emerald-900 dark:text-slate-200 group-hover:text-emerald-700 block">Admin Role</span>
                            <span class="text-[9px] text-slate-400 font-mono block mt-0.5">ID: admin / admin123</span>
                        </button>
                        <button @click="autoFill('staff')" class="border border-emerald-100/50 dark:border-slate-800 hover:border-emerald-200 bg-emerald-50/10 hover:bg-emerald-50/40 p-3 rounded-xl text-left transition group">
                            <span class="text-[10px] font-bold text-emerald-900 dark:text-slate-200 group-hover:text-emerald-700 block">Office Staff</span>
                            <span class="text-[9px] text-slate-400 font-mono block mt-0.5">ID: staff01 / staff123</span>
                        </button>
                    </div>
                </div>
            </div>
        </template>

        <!-- 2. ROUTED WORKSPACES -->
        <template x-if="user">
            <div class="w-full max-w-6xl bg-white dark:bg-slate-900 border border-emerald-100 dark:border-slate-800 p-8 rounded-3xl shadow-sm space-y-8 animate-fadeIn">
                
                <!-- Welcome sub-header -->
                <div class="flex flex-col sm:flex-row sm:items-center justify-between pb-6 border-b border-slate-100 dark:border-slate-800 gap-4">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-[9px] font-bold uppercase tracking-widest px-2.5 py-0.5 rounded-full"
                                  :class="user.role === 'ADMIN' ? 'bg-amber-50 dark:bg-amber-950/45 text-amber-950 dark:text-amber-400 border border-amber-100 dark:border-amber-900' : 'bg-emerald-50 dark:bg-emerald-950/45 text-emerald-950 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-900'"
                                  x-text="user.role + ' Session'"></span>
                        </div>
                        <h2 class="text-2xl font-extrabold text-emerald-950 dark:text-white mt-1" x-text="user.name"></h2>
                    </div>
                    
                    <button @click="logout()" class="text-xs font-bold text-emerald-900 dark:text-emerald-400 hover:text-rose-600 transition bg-emerald-50 dark:bg-slate-800 px-4 py-2 rounded-xl border border-emerald-100 dark:border-slate-700 self-start sm:self-center">
                        Sign Out
                    </button>
                </div>

                <!-- ADMIN SPECIFIC SUPERVISORY CONTROL VIEW -->
                <template x-if="user.role === 'ADMIN'">
                    <div class="space-y-8" x-data="adminDashboard()">
                        
                        <!-- Internal Admin Subtabs for different sections -->
                        <div class="flex border-b border-slate-100 dark:border-slate-800 gap-6 overflow-x-auto pb-px">
                            <button @click="currentSubTab = 'staff'" 
                                    class="pb-3 text-xs font-bold uppercase tracking-wider transition border-b-2"
                                    :class="currentSubTab === 'staff' ? 'text-emerald-600 border-emerald-600 dark:text-emerald-400 dark:border-emerald-400' : 'text-slate-400 border-transparent hover:text-slate-600 dark:hover:text-slate-300'">
                                Staff Directory
                            </button>
                            <button @click="currentSubTab = 'collection'" 
                                    class="pb-3 text-xs font-bold uppercase tracking-wider transition border-b-2"
                                    :class="currentSubTab === 'collection' ? 'text-emerald-600 border-emerald-600 dark:text-emerald-400 dark:border-emerald-400' : 'text-slate-400 border-transparent hover:text-slate-600 dark:hover:text-slate-300'">
                                Collection Summaries
                            </button>
                            <button @click="currentSubTab = 'rewards'" 
                                    class="pb-3 text-xs font-bold uppercase tracking-wider transition border-b-2"
                                    :class="currentSubTab === 'rewards' ? 'text-emerald-600 border-emerald-600 dark:text-emerald-400 dark:border-emerald-400' : 'text-slate-400 border-transparent hover:text-slate-600 dark:hover:text-slate-300'">
                                Reward Reports
                            </button>
                            <button @click="currentSubTab = 'complaints'" 
                                    class="pb-3 text-xs font-bold uppercase tracking-wider transition border-b-2"
                                    :class="currentSubTab === 'complaints' ? 'text-emerald-600 border-emerald-600 dark:text-emerald-400 dark:border-emerald-400' : 'text-slate-400 border-transparent hover:text-slate-600 dark:hover:text-slate-300'">
                                Complaint Reports
                            </button>
                        </div>

                        <!-- SUBTAB 1: OFFICE STAFF MANAGEMENT (FULL CRUD) -->
                        <div x-show="currentSubTab === 'staff'" class="space-y-6 animate-fadeIn">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <h3 class="text-sm font-bold uppercase tracking-wider text-emerald-950 dark:text-emerald-400">Staff Registry</h3>
                                <button @click="openStaffModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs px-4 py-2.5 rounded-xl transition shadow-sm">
                                    + Register New Staff
                                </button>
                            </div>

                            <!-- Staff Search Bar -->
                            <div class="bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 p-3 rounded-2xl flex items-center gap-3">
                                <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                                <input type="text" placeholder="Filter staff..." x-model="searchQuery" 
                                       class="bg-transparent text-xs w-full focus:outline-none text-slate-700 dark:text-slate-300">
                            </div>

                            <!-- Staff Grid List -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <template x-for="s in getFilteredStaff()" :key="s.id">
                                    <div class="bg-white dark:bg-slate-900 border rounded-2xl p-5 flex flex-col justify-between gap-4 transition"
                                         :class="s.status === 'Active' ? 'border-emerald-100 dark:border-slate-800 bg-[#fbfdfc] dark:bg-slate-900/60' : 'border-slate-200 dark:border-slate-800 opacity-60 bg-slate-50 dark:bg-slate-800/20'">
                                        <div class="flex items-start justify-between gap-4">
                                            <div class="space-y-1">
                                                <div class="flex items-center gap-2">
                                                    <span class="text-[10px] font-mono font-bold text-slate-400" x-text="s.id"></span>
                                                    <span class="text-[9px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full"
                                                          :class="s.status === 'Active' ? 'bg-emerald-50 dark:bg-emerald-950/45 text-emerald-800 dark:text-emerald-400' : 'bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400'"
                                                          x-text="s.status"></span>
                                                </div>
                                                <h4 class="font-extrabold text-slate-900 dark:text-white text-sm" x-text="s.name"></h4>
                                                <p class="text-xs text-slate-500 dark:text-slate-400 font-semibold" x-text="s.designation"></p>
                                                <p class="text-xs text-slate-400 dark:text-slate-500 font-mono" x-text="'@' + s.username"></p>
                                            </div>
                                            
                                            <!-- Edit/Toggle Actions -->
                                            <div class="flex items-center gap-1.5">
                                                <button @click="openStaffModal(s)" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-400 transition" title="Modify Information">
                                                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                                    </svg>
                                                </button>
                                                <button @click="toggleStaffStatus(s.id)" class="p-1.5 rounded-lg transition"
                                                        :class="s.status === 'Active' ? 'text-amber-600 hover:bg-amber-50 dark:hover:bg-amber-950/20' : 'text-emerald-600 hover:bg-emerald-50 dark:hover:bg-emerald-950/20'"
                                                        :title="s.status === 'Active' ? 'Deactivate Account' : 'Activate Account'">
                                                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636" />
                                                    </svg>
                                                </button>
                                            </div>
                                        </div>

                                        <div class="pt-3 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between text-xs text-slate-500">
                                            <span class="flex items-center gap-1">
                                                <svg class="h-3.5 w-3.5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                                </svg>
                                                <span x-text="s.zone"></span>
                                            </span>
                                            <span x-text="s.phone"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- POPUP MODAL: REGISTER & EDIT STAFF -->
                            <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn"
                                 x-show="staffFormOpen" style="display: none;">
                                <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 w-full max-w-md border border-emerald-100 dark:border-slate-850 shadow-xl space-y-4">
                                    <h4 class="text-sm font-bold uppercase tracking-wider text-emerald-950 dark:text-emerald-450" x-text="isEditMode ? 'Modify Staff Record' : 'Register New Office Staff'"></h4>
                                    
                                    <form @submit.prevent="submitStaffForm()" class="space-y-4 text-xs">
                                        <div class="space-y-1">
                                            <label class="font-bold text-slate-500 uppercase tracking-wider">Full Name</label>
                                            <input type="text" required x-model="staffForm.name" class="w-full bg-slate-50 dark:bg-slate-800 border rounded-xl p-3 focus:outline-none dark:text-slate-100">
                                        </div>
                                        
                                        <div class="grid grid-cols-2 gap-3">
                                            <div class="space-y-1">
                                                <label class="font-bold text-slate-500 uppercase tracking-wider">Username</label>
                                                <input type="text" required x-model="staffForm.username" class="w-full bg-slate-50 dark:bg-slate-800 border rounded-xl p-3 focus:outline-none dark:text-slate-100" placeholder="user_handle">
                                            </div>
                                            <div class="space-y-1">
                                                <label class="font-bold text-slate-500 uppercase tracking-wider">Designation</label>
                                                <input type="text" required x-model="staffForm.designation" class="w-full bg-slate-50 dark:bg-slate-800 border rounded-xl p-3 focus:outline-none dark:text-slate-100" placeholder="e.g., Coordinator">
                                            </div>
                                        </div>

                                        <div class="space-y-1">
                                            <label class="font-bold text-slate-500 uppercase tracking-wider">Designated Zone</label>
                                            <select x-model="staffForm.zone" class="w-full bg-slate-50 dark:bg-slate-800 border rounded-xl p-3 focus:outline-none dark:text-slate-100">
                                                <option value="Zone A (North)">Zone A (North)</option>
                                                <option value="Zone B (East)">Zone B (East)</option>
                                                <option value="Zone C (West)">Zone C (West)</option>
                                                <option value="Zone D (South)">Zone D (South)</option>
                                            </select>
                                        </div>

                                        <div class="grid grid-cols-2 gap-3">
                                            <div class="space-y-1">
                                                <label class="font-bold text-slate-500 uppercase tracking-wider">Email</label>
                                                <input type="email" required x-model="staffForm.email" class="w-full bg-slate-50 dark:bg-slate-800 border rounded-xl p-3 focus:outline-none dark:text-slate-100">
                                            </div>
                                            <div class="space-y-1">
                                                <label class="font-bold text-slate-500 uppercase tracking-wider">Phone</label>
                                                <input type="text" required x-model="staffForm.phone" class="w-full bg-slate-50 dark:bg-slate-800 border rounded-xl p-3 focus:outline-none dark:text-slate-100">
                                            </div>
                                        </div>

                                        <div class="flex gap-2.5 pt-2">
                                            <button type="button" @click="staffFormOpen = false" class="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold p-3 rounded-xl transition">Cancel</button>
                                            <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold p-3 rounded-xl transition shadow-sm">Save Details</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <!-- SUBTAB 2: SUMMARIZED WASTE COLLECTION REPORTS -->
                        <div x-show="currentSubTab === 'collection'" class="space-y-6 animate-fadeIn">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <h3 class="text-sm font-bold uppercase tracking-wider text-emerald-950 dark:text-emerald-400">Collection summaries</h3>
                                <div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl gap-1">
                                    <button @click="periodFilter = 'Daily'" class="px-3 py-1.5 text-[10px] font-bold uppercase rounded-lg transition"
                                            :class="periodFilter === 'Daily' ? 'bg-white dark:bg-slate-900 text-emerald-905 dark:text-emerald-450 shadow-sm' : 'text-slate-400 hover:text-slate-600'"></button>
                                    <button @click="periodFilter = 'Weekly'" class="px-3 py-1.5 text-[10px] font-bold uppercase rounded-lg transition"
                                            :class="periodFilter === 'Weekly' ? 'bg-white dark:bg-slate-900 text-emerald-905 dark:text-emerald-450 shadow-sm' : 'text-slate-400 hover:text-slate-600'">Weekly</button>
                                    <button @click="periodFilter = 'Monthly'" class="px-3 py-1.5 text-[10px] font-bold uppercase rounded-lg transition"
                                            :class="periodFilter === 'Monthly' ? 'bg-white dark:bg-slate-900 text-emerald-905 dark:text-emerald-450 shadow-sm' : 'text-slate-400 hover:text-slate-600'">Monthly</button>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <div class="p-5 bg-emerald-50/20 dark:bg-emerald-950/10 border border-emerald-100 dark:border-slate-800 rounded-2xl space-y-1">
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total Collection Requests</p>
                                    <p class="text-2xl font-black text-emerald-950 dark:text-slate-200" x-text="collectionData[periodFilter].requests"></p>
                                </div>
                                <div class="p-5 bg-emerald-50/20 dark:bg-emerald-950/10 border border-emerald-100 dark:border-slate-800 rounded-2xl space-y-1">
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Completed Collections</p>
                                    <p class="text-2xl font-black text-emerald-950 dark:text-slate-200" x-text="collectionData[periodFilter].completed"></p>
                                </div>
                                <div class="p-5 bg-emerald-50/20 dark:bg-emerald-950/10 border border-emerald-100 dark:border-slate-800 rounded-2xl space-y-1">
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Performance Rating</p>
                                    <p class="text-2xl font-black text-emerald-950 dark:text-slate-200" x-text="collectionData[periodFilter].performance"></p>
                                </div>
                            </div>

                            <!-- Progress Bars for collection segments (Excluding Biodegradables) -->
                            <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-6 rounded-2xl space-y-4">

    <script>
        // State system for Office Staff operations tab workspace
        function staffWorkspace() {

                // 1. Waste collection requests queue (Excluding organic biodegradable waste)

                    { id: 'REQ-2026-004', userName: 'Anil Kumar', phone: '+91 9447551122', wasteType: 'Dry Recyclables & Plastic Containers', quantity: '15 Kg', address: 'Rose Villa, Kanjikuzhy, Zone B (East)', preferredDate: '2026-06-03', status: 'Submitted', timestamp: '2026-06-02 09:15 AM' },

                // 2. Collection Schedules list
                schedules: [
                    { id: 'SCH-105', date: '2026-06-03', time: '08:00 AM', worker: 'Ramesh Chennithala', zone: 'Zone B (East)', status: 'Dispatched', requestId: 'REQ-2026-006' }
                ],
                scheduleModalOpen: false,
                activeRequestForSchedule: null,

                // 3. Worker Profiles management
                workers: [
                    { id: 'WRK001', name: 'Ramesh Chennithala', contact: '8129033445', zone: 'Zone B (East)', status: 'Active', completedJobs: 48 },
                    { id: 'WRK002', name: 'Vikraman Pillai', contact: '7012044556', zone: 'Zone B (East)', status: 'Active', completedJobs: 35 },

                ],
                workerModalOpen: false,
                isEditWorker: false,
                workerForm: { id: '', name: '', contact: '', zone: 'Zone B (East)', status: 'Active' },

                // 4. Live Sync Expenses Data Base from Field Workers external apps
                expenses: [
                    { id: 101, workerName: 'Ramesh Chennithala', activeRoute: 'Route-East-B', expenseReason: 'Refuel run for vehicle compression tank', amount: '₹2,450', uploadedAt: '2026-06-05 09:30 AM', billPhoto: 'https://images.unsplash.com/photo-1554415707-6e8cfc93fe23?auto=format&fit=crop&w=300&q=80', status: 'Pending' },
                    { id: 102, workerName: 'Vikraman Pillai', activeRoute: 'Route-Metro-A', expenseReason: 'Hydraulic loading lift belt replacement', amount: '₹1,200', uploadedAt: '2026-06-05 11:15 AM', billPhoto: null, status: 'Pending' },
                    { id: 103, workerName: 'Anandhu Krishna', activeRoute: 'Route-South-D', expenseReason: 'Platform regulatory station sorting clearance toll fee', amount: '₹450', uploadedAt: '2026-06-04 03:00 PM', billPhoto: null, status: 'Approved' }

                pointForm: { user: '', points: '' },

                // Operations Actions
                updateRequestStatus(id, nextStatus) {
                    this.requests = this.requests.map(r => r.id === id ? { ...r, status: nextStatus } : r);
                    this.$parent.showToastMessage(`Request status updated to ${nextStatus}`);
                },

                initiateScheduling(req) {
                    this.activeRequestForSchedule = req;
                    this.scheduleForm = { date: req.preferredDate, time: '08:00 AM', workerId: '' };
                    this.scheduleModalOpen = true;
                },

                saveSchedule() {
                    const assignedWorker = this.workers.find(w => w.id === this.scheduleForm.workerId);
                    if (!assignedWorker) return;

                    const newSchedId = 'SCH-' + (100 + this.schedules.length + 6);
                    this.schedules.unshift({
                        id: newSchedId,
                        date: this.scheduleForm.date,
                        time: this.scheduleForm.time,
                        worker: assignedWorker.name,
                        zone: this.activeRequestForSchedule.address.split(',').pop().trim(),
                        status: 'Dispatched',
                        requestId: this.activeRequestForSchedule.id
                    });

                    // Update parent request status
                    this.updateRequestStatus(this.activeRequestForSchedule.id, 'Assigned');
                    this.scheduleModalOpen = false;
                    this.$parent.showToastMessage('Duty scheduled and dispatched successfully!');
                },

                completeSchedule(schedId, reqId) {
                    this.schedules = this.schedules.map(s => s.id === schedId ? { ...s, status: 'Completed' } : s);
                    this.requests = this.requests.map(r => r.id === reqId ? { ...r, status: 'In Progress' } : r);
                    this.$parent.showToastMessage('Schedule accomplished. Ready to award points.');

                    // Update Request status to Completed
                    this.updateRequestStatus(req.id, 'Completed');
                    // Automatically issue points in the transaction registry simulation
                    this.$parent.showToastMessage(`100 PTS issued to ${req.userName} for compliant waste recycling.`);
                },

                // Worker Registry actions
                openWorkerModal(selectedWorker = null) {
                    if (selectedWorker) {
                        this.isEditWorker = true;
                        this.workerForm = { ...selectedWorker };
                    } else {
                        this.isEditWorker = false;
                        this.workerForm = { id: '', name: '', contact: '', zone: 'Zone B (East)', status: 'Active' };
                    }
                    this.workerModalOpen = true;
                },

                submitWorkerForm() {
                    if (this.isEditWorker) {
                        this.workers = this.workers.map(w => w.id === this.workerForm.id ? { ...this.workerForm } : w);
                        this.$parent.showToastMessage(`Worker profile saved: ${this.workerForm.name}`);
                    } else {
                        const newId = 'WRK00' + (this.workers.length + 1);
                        this.workers.push({ ...this.workerForm, id: newId, completedJobs: 0 });
                        this.$parent.showToastMessage(`Registered worker: ${this.workerForm.name}`);
                    }
                    this.workerModalOpen = false;
                },

                // Sync Audit Resolution Actions
                processExpenseAction(id, resolution) {
                    this.expenses = this.expenses.map(item => {
                        if (item.id === id) item.status = resolution;
                        return item;
                    });
                    this.$parent.showToastMessage(`Incidental expense report was marked ${resolution}.`);
                },

                // Complaint Desk actions
                openComplaintAssignment(comp) {
                    this.activeComplaint = comp;
                    this.selectedComplaintWorkerId = '';
                    this.complaintModalOpen = true;
                },

                assignComplaintCrew() {
                    const worker = this.workers.find(w => w.id === this.selectedComplaintWorkerId);
                    if (!worker) return;

                    this.complaints = this.complaints.map(c => {
                        if (c.id === this.activeComplaint.id) {
                            return { ...c, status: 'Assigned', assignedWorker: worker.name };
                        }
                        return c;
                    });
                    this.complaintModalOpen = false;
                    this.$parent.showToastMessage(`Dispatched ${worker.name} to cleanup area.`);
                },

                resolveComplaint(id) {
                    this.complaints = this.complaints.map(c => c.id === id ? { ...c, status: 'Resolved' } : c);
                    this.$parent.showToastMessage('Complaint resolved and marked closed.');
                },

                // Reward Desk operations
                processVoucherClaim(claimId) {
                    this.claims = this.claims.map(c => c.id === claimId ? { ...c, status: 'Issued' } : c);
                    this.$parent.showToastMessage('Redemption voucher code generated and transmitted.');
                },

                issueManualPoints() {
                    this.$parent.showToastMessage(`${this.pointForm.points} PTS credited to user account: ${this.pointForm.user}`);
                    this.pointForm = { user: '', points: '' };
                }
            };
        }

        function loginPortal() {
            return {
                credentials: { id: '', password: '' },
                user: null,
                loading: false,
                errorMessage: '',
                toast: null,
                darkMode: false,

                initTheme() {
                    if (localStorage.getItem('darkMode') === 'true' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        this.darkMode = true;
                        document.documentElement.classList.add('dark');
                    } else {
                        this.darkMode = false;
                        document.documentElement.classList.remove('dark');
                    }
                },

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    document.documentElement.classList.toggle('dark', this.darkMode);
                    localStorage.setItem('darkMode', this.darkMode);
                },

                showToastMessage(msg) {
                    this.toast = msg;
                    setTimeout(() => { this.toast = null; }, 3000);
                },

                autoFill(role) {
                    if (role === 'admin') {
                        this.credentials.id = 'admin';
                        this.credentials.password = 'admin123';
                    } else {
                        this.credentials.id = 'staff01';
                        this.credentials.password = 'staff123';
                    }
                },

                async submitLogin() {
                    this.loading = true;
                    this.errorMessage = '';

                    try {
                        let response = await fetch('http://localhost:8080/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.credentials.id,
                                password: this.credentials.password
                            })
                        });

                        if (response.ok) {
                            this.user = await response.json();
                            this.showToastMessage(`Terminal Authenticated: ${this.user.name}`);
                        } else {
                            this.errorMessage = 'Invalid ID or passcode.';
                        }
                    } catch (err) {
                        // Safe simulated fallback if Spring Boot local server is offline
                        let idToCheck = this.credentials.id.trim().toLowerCase();
                        if (idToCheck === 'admin' && this.credentials.password === 'admin123') {
                            this.user = { username: 'admin', role: 'ADMIN', name: 'Chief Administrator' };
                            this.showToastMessage('Identified Role: Administrator');
                        } else if ((idToCheck === 'staff01' || idToCheck === 'staff') && this.credentials.password === 'staff123') {
                            this.user = { username: 'staff01', role: 'STAFF', name: 'Meera Joseph (Office Staff)', zone: 'Zone B (East)' };
                            this.showToastMessage('Identified Role: Office Staff');
                        } else {
                            this.errorMessage = 'Credentials mismatch. Use admin/admin123 or staff01/staff123';
                        }
                    } finally {
                        this.loading = false;
                    }
                },

                logout() {
                    this.user = null;
                    this.credentials.id = '';
                    this.credentials.password = '';
                    this.showToastMessage('Session closed.');
                }
            };
        }
